name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pip-audit

      - name: Ruff (lint)
        # Не падаем сразу — только показываем найденное в первом запуске.
        # Когда репо будет чище, заменить на `ruff check .`
        run: ruff check . --output-format=github --exit-zero

      - name: Pytest
        env:
          DEV_MODE: "true"
          APP_ENV: "dev"
          JWT_SECRET: "ci-secret-not-for-prod"
          ALLOWED_ORIGINS: "http://localhost:8000"
        run: pytest -q

      - name: pip-audit (vulnerabilities)
        # exit-zero на первом запуске, чтобы не блокировать merge'ы
        # на старых уязвимостях. После очистки убрать `|| true`.
        run: pip-audit --desc -r requirements.txt || true
