<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Студия Че — Презентации и КП</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#ff8c42","secondary":"#ffb347","bg":"#1C1C1C","surface":"#1e1a14","surface2":"#272018","surface3":"#322a1e","on-surface":"#f0e6d8","on-dim":"#a89880","outline":"#4a3f2f","error":"#ff6b6b"},fontFamily:{headline:["Manrope","sans-serif"],body:["Inter","sans-serif"]}}}}</script>
<style>
*{scrollbar-width:thin;scrollbar-color:rgba(255,140,66,0.2) transparent}
*::-webkit-scrollbar{width:4px}*::-webkit-scrollbar-track{background:transparent}*::-webkit-scrollbar-thumb{background:rgba(255,140,66,0.25);border-radius:999px}
body{background:#1C1C1C;color:#f0e6d8;font-family:Inter,sans-serif;min-height:100vh}
.sig{background:linear-gradient(135deg,#ff8c42,#ffb347)}
.sig-text{background:linear-gradient(135deg,#ff8c42,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.inp{width:100%;padding:9px 13px;border-radius:9px;background:#272018;color:#f0e6d8;border:1px solid rgba(74,63,47,0.5);outline:none;font-size:13px;font-family:inherit;transition:border-color .2s}
.inp:focus{border-color:#ff8c42}.inp::placeholder{color:#a89880}
.btn-p{background:linear-gradient(135deg,#ff8c42,#ffb347);color:#141210;font-weight:700;border-radius:11px;padding:10px 20px;cursor:pointer;font-size:14px;border:none;display:inline-flex;align-items:center;gap:8px;transition:opacity .15s}
.btn-p:hover{opacity:.88}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:#272018;color:#a89880;border:1px solid rgba(74,63,47,0.4);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-g:hover{color:#f0e6d8;border-color:#ff8c42}
.card{background:#1e1a14;border:1.5px solid rgba(74,63,47,0.25);border-radius:16px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow-y:auto;padding:24px}
.modal-bg.show{display:flex}
.tab-switch{display:flex;background:#272018;border-radius:10px;padding:3px;gap:2px}
.tab-sw-btn{flex:1;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;color:#a89880;background:transparent}
.tab-sw-btn.active{background:linear-gradient(135deg,#ff8c42,#ffb347);color:#141210}
.proj-card{cursor:pointer;transition:all .15s;background:#1e1a14;border:1.5px solid rgba(74,63,47,0.25);border-radius:14px;padding:16px}
.proj-card:hover{border-color:rgba(255,140,66,0.4);transform:translateY(-1px)}
.type-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:9999px}
.badge-kp{background:rgba(255,140,66,0.12);color:#ff8c42;border:1px solid rgba(255,140,66,0.2)}
.badge-pres{background:rgba(99,102,241,0.12);color:#a5b4fc;border:1px solid rgba(99,102,241,0.2)}
.result-content{font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.result-content h1,.result-content h2,.result-content h3{font-family:Manrope,sans-serif;font-weight:700;margin:1em 0 0.4em}
.result-content h1{font-size:20px;color:#ff8c42}
.result-content h2{font-size:16px;color:#ffb347}
.profile-field label{display:block;font-size:11px;color:#a89880;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
</style>
</head>
<body class="dark">

<div class="max-w-6xl mx-auto px-5 py-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-4">
      <a href="index.html" class="btn-g text-xs">← Назад</a>
      <div>
        <h1 class="text-2xl font-extrabold font-headline">Презентации и <span class="sig-text">КП</span></h1>
        <p class="text-sm text-on-dim">Генерация коммерческих предложений и презентаций с AI</p>
      </div>
    </div>
    <button onclick="openCreate()" class="btn-p">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Создать
    </button>
  </div>

  <!-- ── Мои шаблоны (профиль компании) ── -->
  <div class="card mb-6">
    <button onclick="toggleProfile()" class="w-full px-6 py-4 flex items-center justify-between text-left">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 sig rounded-lg flex items-center justify-center flex-shrink-0">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#141210"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div>
          <p class="font-headline font-bold text-sm">Мои шаблоны</p>
          <p class="text-xs text-on-dim">Информация о компании, прайс и стиль — используются при генерации</p>
        </div>
      </div>
      <svg id="profileChevron" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-on-dim transition-transform"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>

    <div id="profilePanel" class="hidden border-t border-outline/15 p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="profile-field">
          <label>Название компании</label>
          <input id="pf_company" type="text" class="inp" placeholder="ООО «Ромашка»"/>
        </div>
        <div class="profile-field">
          <label>Контакты</label>
          <input id="pf_contacts" type="text" class="inp" placeholder="+7 999 000-00-00 | site.ru"/>
        </div>
        <div class="profile-field md:col-span-2">
          <label>Чем занимается компания</label>
          <textarea id="pf_description" rows="2" class="inp resize-none text-sm" placeholder="Производим и поставляем промышленное оборудование с 2010 года..."></textarea>
        </div>
        <div class="profile-field md:col-span-2">
          <label>Услуги и товары</label>
          <textarea id="pf_services" rows="3" class="inp resize-none text-sm" placeholder="1. Монтаж оборудования — от 50 000 ₽&#10;2. Техническое обслуживание — от 15 000 ₽/мес&#10;..."></textarea>
        </div>
        <div class="profile-field md:col-span-2">
          <label>Прайс-лист</label>
          <textarea id="pf_prices" rows="3" class="inp resize-none text-sm" placeholder="Базовый пакет — 30 000 ₽&#10;Стандарт — 60 000 ₽&#10;Премиум — 120 000 ₽"></textarea>
        </div>
        <div class="profile-field md:col-span-2">
          <label>Стиль оформления и тон</label>
          <input id="pf_style" type="text" class="inp" placeholder="Деловой, без воды, с цифрами и фактами. Цвета: тёмно-синий и оранжевый."/>
        </div>
      </div>
      <div class="flex items-center gap-3 mt-5">
        <button onclick="saveProfile()" class="btn-p">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
          Сохранить
        </button>
        <span id="profileSaved" class="text-xs text-primary hidden">Сохранено ✓</span>
      </div>
    </div>
  </div>

  <!-- ── Переключатель КП / Презентации ── -->
  <div class="flex items-center justify-between mb-5">
    <div class="tab-switch w-fit">
      <button class="tab-sw-btn active" id="tab-kp" onclick="switchTab('kp')">
        📄 Коммерческие предложения
      </button>
      <button class="tab-sw-btn" id="tab-presentation" onclick="switchTab('presentation')">
        📊 Презентации
      </button>
    </div>
    <p class="text-xs text-on-dim hidden md:block" id="tabCount">0 проектов</p>
  </div>

  <!-- Projects grid -->
  <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden text-center py-20">
    <div class="w-16 h-16 rounded-2xl sig flex items-center justify-center mx-auto mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#1C1C1C"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
    </div>
    <h2 class="text-xl font-bold font-headline mb-2">Нет проектов</h2>
    <p class="text-on-dim text-sm mb-6" id="emptyText">Создайте первое КП — AI сгенерирует профессиональный документ</p>
    <button onclick="openCreate()" class="btn-p">Создать первый проект</button>
  </div>
</div>

<!-- ── Create Modal ── -->
<div id="createModal" class="modal-bg">
  <div class="bg-surface rounded-2xl w-full max-w-lg border border-outline/25 shadow-2xl overflow-hidden">
    <div class="sig px-6 py-4 flex items-center justify-between">
      <h2 class="font-headline font-bold text-[#1C1C1C] text-lg">Новый проект</h2>
      <button onclick="closeCreate()" class="w-7 h-7 rounded-full bg-black/10 flex items-center justify-center hover:bg-black/20 text-[#1C1C1C] text-lg">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs text-on-dim uppercase tracking-wider mb-1.5">Тип документа</label>
        <div class="tab-switch">
          <button class="tab-sw-btn active" id="create-tab-kp" onclick="setCreateType('kp')">📄 КП</button>
          <button class="tab-sw-btn" id="create-tab-presentation" onclick="setCreateType('presentation')">📊 Презентация</button>
        </div>
      </div>
      <div>
        <label class="block text-xs text-on-dim uppercase tracking-wider mb-1.5">Название</label>
        <input id="proj_name" type="text" class="inp" placeholder="КП для клиента / Презентация продукта"/>
      </div>
      <div>
        <label class="block text-xs text-on-dim uppercase tracking-wider mb-1.5">Описание задачи</label>
        <textarea id="proj_desc" rows="4" class="inp resize-none text-sm leading-relaxed"
          placeholder="Для кого делаем? Что хотим донести? Какой результат нужен? Любые детали..."></textarea>
      </div>
      <div id="proj_err" class="text-error text-xs hidden"></div>
      <div class="flex gap-3 pt-1">
        <button onclick="closeCreate()" class="btn-g flex-1">Отмена</button>
        <button onclick="saveProject()" class="btn-p flex-1 justify-center" id="saveProjectBtn">Создать и сгенерировать</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Detail Modal ── -->
<div id="detailModal" class="modal-bg">
  <div class="bg-surface rounded-2xl w-full max-w-4xl border border-outline/25 shadow-2xl flex flex-col" style="max-height:92vh">
    <div class="sig px-6 py-4 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-3">
        <h2 class="font-headline font-bold text-[#1C1C1C] text-lg" id="detailTitle">Проект</h2>
        <span id="detailTypeBadge" class="type-badge badge-kp">КП</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="deleteCurrentProject()" class="bg-black/10 hover:bg-black/20 rounded-lg p-1.5 text-[#1C1C1C]/70">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
        <button onclick="closeDetail()" class="w-7 h-7 rounded-full bg-black/10 flex items-center justify-center hover:bg-black/20 text-[#1C1C1C] text-lg">✕</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-5 min-h-0">
      <!-- Status / Generate -->
      <div id="detailDraft" class="hidden bg-surface2 rounded-xl p-5 border border-outline/20">
        <p class="text-sm text-on-dim mb-4">AI сгенерирует документ на основе вашего описания и профиля компании.</p>
        <div class="mb-4">
          <label class="block text-xs text-on-dim mb-1.5">Описание задачи</label>
          <textarea id="detailDesc" rows="3" class="inp resize-none text-sm"></textarea>
        </div>
        <button onclick="generateCurrent()" class="btn-p" id="genBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25z"/></svg>
          Сгенерировать (30 CH)
        </button>
      </div>

      <!-- Generated content -->
      <div id="detailDone" class="hidden space-y-4">
        <div class="flex items-center justify-between">
          <p class="text-sm font-semibold text-primary">Готово</p>
          <div class="flex gap-2">
            <button onclick="copyContent()" class="btn-g text-xs">Копировать</button>
            <button onclick="downloadContent()" class="btn-g text-xs">Скачать .txt</button>
            <button onclick="regenerateCurrent()" class="btn-g text-xs">Перегенерировать (30 CH)</button>
          </div>
        </div>
        <div id="detailContent" class="bg-surface2 rounded-xl p-6 border border-outline/15 result-content"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = localStorage.getItem('obs_api') || window.location.origin;
const authToken = localStorage.getItem('obs_token');

let projects = [];
let currentTab = 'kp';
let createType = 'kp';
let currentProjectId = null;
let currentProject = null;

function hdrs(extra = {}) {
  const h = {'Content-Type': 'application/json', ...extra};
  if (authToken) h['Authorization'] = 'Bearer ' + authToken;
  return h;
}

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (!authToken) { window.location.href = 'index.html'; return; }
  await Promise.all([loadProjects(), loadProfile()]);
});

// ── Profile ────────────────────────────────────────────────────────────────
async function loadProfile() {
  try {
    const r = await fetch(`${API}/presentations/company-profile`, {headers: hdrs()});
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('pf_company').value     = d.company_name || '';
    document.getElementById('pf_description').value = d.description  || '';
    document.getElementById('pf_services').value    = d.services     || '';
    document.getElementById('pf_prices').value      = d.prices       || '';
    document.getElementById('pf_style').value       = d.style_notes  || '';
    document.getElementById('pf_contacts').value    = d.contacts     || '';
  } catch(e) {}
}

async function saveProfile() {
  const body = {
    company_name: document.getElementById('pf_company').value.trim(),
    description:  document.getElementById('pf_description').value.trim(),
    services:     document.getElementById('pf_services').value.trim(),
    prices:       document.getElementById('pf_prices').value.trim(),
    style_notes:  document.getElementById('pf_style').value.trim(),
    contacts:     document.getElementById('pf_contacts').value.trim(),
  };
  try {
    const r = await fetch(`${API}/presentations/company-profile`, {
      method: 'PUT', headers: hdrs(), body: JSON.stringify(body)
    });
    if (r.ok) {
      const el = document.getElementById('profileSaved');
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 2500);
    }
  } catch(e) { alert('Ошибка сохранения: ' + e.message); }
}

function toggleProfile() {
  const panel = document.getElementById('profilePanel');
  const chevron = document.getElementById('profileChevron');
  panel.classList.toggle('hidden');
  chevron.style.transform = panel.classList.contains('hidden') ? '' : 'rotate(180deg)';
}

// ── Projects ───────────────────────────────────────────────────────────────
async function loadProjects() {
  try {
    const r = await fetch(`${API}/presentations/projects`, {headers: hdrs()});
    if (r.ok) projects = await r.json();
    render();
  } catch(e) { projects = []; render(); }
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-kp').classList.toggle('active', tab === 'kp');
  document.getElementById('tab-presentation').classList.toggle('active', tab === 'presentation');
  render();
}

function render() {
  const list = projects.filter(p => p.doc_type === currentTab);
  const grid = document.getElementById('projectGrid');
  const empty = document.getElementById('emptyState');

  document.getElementById('tabCount').textContent = list.length + ' проектов';
  document.getElementById('emptyText').textContent = currentTab === 'kp'
    ? 'Создайте первое КП — AI сгенерирует профессиональный документ'
    : 'Создайте первую презентацию — AI подготовит структуру и содержание';

  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  grid.innerHTML = list.map(p => {
    const date = p.created_at ? new Date(p.created_at).toLocaleDateString('ru-RU') : '—';
    const statusLabel = p.status === 'done' ? '<span class="text-xs text-primary font-semibold">Готово</span>' : '<span class="text-xs text-on-dim">Черновик</span>';
    const badge = p.doc_type === 'kp'
      ? '<span class="type-badge badge-kp">КП</span>'
      : '<span class="type-badge badge-pres">Презентация</span>';
    return `<div class="proj-card" onclick="openProject(${p.id})">
      <div class="flex items-start justify-between gap-2 mb-3">
        <p class="font-bold font-headline text-sm truncate flex-1">${esc(p.name)}</p>
        ${badge}
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-on-dim">${date}</span>
        ${statusLabel}
      </div>
    </div>`;
  }).join('');
}

// ── Create ─────────────────────────────────────────────────────────────────
function setCreateType(type) {
  createType = type;
  document.getElementById('create-tab-kp').classList.toggle('active', type === 'kp');
  document.getElementById('create-tab-presentation').classList.toggle('active', type === 'presentation');
}

function openCreate() {
  document.getElementById('proj_name').value = '';
  document.getElementById('proj_desc').value = '';
  document.getElementById('proj_err').classList.add('hidden');
  setCreateType(currentTab);
  document.getElementById('createModal').classList.add('show');
}

function closeCreate() { document.getElementById('createModal').classList.remove('show'); }

async function saveProject() {
  const name = document.getElementById('proj_name').value.trim();
  const desc = document.getElementById('proj_desc').value.trim();
  const err = document.getElementById('proj_err');
  err.classList.add('hidden');
  if (!name) { err.textContent = 'Введите название'; err.classList.remove('hidden'); return; }

  const btn = document.getElementById('saveProjectBtn');
  btn.disabled = true; btn.textContent = 'Создаём...';

  try {
    const r = await fetch(`${API}/presentations/projects`, {
      method: 'POST', headers: hdrs(),
      body: JSON.stringify({name, doc_type: createType, description: desc})
    });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || 'Ошибка');
    const data = await r.json();
    closeCreate();
    await loadProjects();
    // Сразу открываем и генерируем
    await openProject(data.id, desc);
  } catch(e) {
    err.textContent = e.message; err.classList.remove('hidden');
  }
  btn.disabled = false; btn.textContent = 'Создать и сгенерировать';
}

// ── Detail ─────────────────────────────────────────────────────────────────
async function openProject(id, preDesc) {
  currentProjectId = id;
  try {
    const r = await fetch(`${API}/presentations/projects/${id}`, {headers: hdrs()});
    if (!r.ok) throw new Error(r.statusText);
    currentProject = await r.json();
  } catch(e) { alert('Ошибка: ' + e.message); return; }

  const p = currentProject;
  document.getElementById('detailTitle').textContent = p.name;
  document.getElementById('detailTypeBadge').textContent = p.doc_type === 'kp' ? 'КП' : 'Презентация';
  document.getElementById('detailTypeBadge').className = 'type-badge ' + (p.doc_type === 'kp' ? 'badge-kp' : 'badge-pres');

  const inp = (() => { try { return JSON.parse(p.input_data || '{}'); } catch { return {}; } })();
  const desc = preDesc || inp.description || '';

  if (p.status === 'done' && p.generated_content) {
    document.getElementById('detailDraft').classList.add('hidden');
    document.getElementById('detailDone').classList.remove('hidden');
    renderContent(p.generated_content);
  } else {
    document.getElementById('detailDone').classList.add('hidden');
    document.getElementById('detailDraft').classList.remove('hidden');
    document.getElementById('detailDesc').value = desc;
    // Если есть описание — сразу генерируем
    if (desc) setTimeout(() => generateCurrent(), 300);
  }

  document.getElementById('detailModal').classList.add('show');
}

function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

function renderContent(text) {
  // Simple markdown-like rendering
  const html = esc(text)
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
  document.getElementById('detailContent').innerHTML = html;
}

async function generateCurrent() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = 'Генерирую...';

  // Обновляем описание в проекте перед генерацией
  const desc = document.getElementById('detailDesc')?.value?.trim();
  if (desc !== undefined) {
    try {
      const inp = (() => { try { return JSON.parse(currentProject.input_data || '{}'); } catch { return {}; } })();
      inp.description = desc;
      await fetch(`${API}/presentations/projects/${currentProjectId}`, {
        method: 'PUT', headers: hdrs(),
        body: JSON.stringify({input_data: JSON.stringify(inp)})
      }).catch(() => {});
    } catch {}
  }

  try {
    const r = await fetch(`${API}/presentations/projects/${currentProjectId}/generate`, {
      method: 'POST', headers: hdrs(), body: JSON.stringify({})
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      if (r.status === 402) throw new Error('Недостаточно токенов (нужно 30 CH)');
      throw new Error(d.detail || 'Ошибка генерации');
    }
    const data = await r.json();
    currentProject.status = 'done';
    currentProject.generated_content = data.generated_content;
    document.getElementById('detailDraft').classList.add('hidden');
    document.getElementById('detailDone').classList.remove('hidden');
    renderContent(data.generated_content);
    loadProjects();
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Сгенерировать (30 CH)';
}

async function regenerateCurrent() {
  document.getElementById('detailDone').classList.add('hidden');
  document.getElementById('detailDraft').classList.remove('hidden');
  const inp = (() => { try { return JSON.parse(currentProject.input_data || '{}'); } catch { return {}; } })();
  document.getElementById('detailDesc').value = inp.description || '';
  await generateCurrent();
}

async function deleteCurrentProject() {
  if (!confirm('Удалить проект?')) return;
  try {
    await fetch(`${API}/presentations/projects/${currentProjectId}`, {method: 'DELETE', headers: hdrs()});
    closeDetail();
    await loadProjects();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function copyContent() {
  const text = document.getElementById('detailContent').innerText;
  navigator.clipboard.writeText(text);
  const btn = event.target.closest('button');
  const orig = btn.textContent;
  btn.textContent = 'Скопировано!';
  setTimeout(() => btn.textContent = orig, 2000);
}

function downloadContent() {
  const text = document.getElementById('detailContent').innerText;
  const name = (currentProject?.name || 'document').replace(/[^a-zA-Zа-яА-Я0-9_-]/g, '_');
  const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = name + '.txt'; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

document.getElementById('createModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreate(); });
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
</script>
